name: Weekly Code Audit

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9am UTC
  workflow_dispatch:      # Manual trigger for debugging

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/qwen3.6-plus
          prompt: |
            Perform a comprehensive code audit of the entire codebase.

            ## Step 1: Find TODO, FIXME, HACK, and XXX Comments
            - Search all source files for TODO, FIXME, HACK, XXX, BUG, WORKAROUND comments
            - Extract the full comment text and file location
            - Note the context (which function/class/file)

            ## Step 2: Identify Code Quality Issues
            - Functions that are too long (>50 lines) or too complex
            - Duplicated code blocks
            - Unused variables, imports, or exports
            - Missing error handling (empty catch blocks, swallowed errors)
            - Magic numbers or hardcoded values without explanation
            - Inconsistent naming conventions
            - Missing JSDoc/type annotations on exported functions

            ## Step 3: Check for Potential Bugs
            - Race conditions or async/await misuse
            - Off-by-one errors in loops
            - Unhandled promise rejections
            - Type coercion issues (== vs ===)
            - Null/undefined access without guards
            - Memory leaks (unclosed listeners, timers, intervals)

            ## Step 4: Review Best Practices
            - Proper use of ES modules vs CommonJS
            - Consistent error handling patterns
            - Separation of concerns (business logic mixed with UI/IO)
            - Immutability violations
            - Side effects in pure functions

            ## Step 5: Create Audit Report

            Format the GitHub issue body as follows:

            ---

            # 🔍 Weekly Code Audit Report

            ## 📊 Summary
            | Category | Count | Priority |
            |----------|-------|----------|
            | TODO/FIXME items | X | Review needed |
            | Code quality issues | X | Refactor |
            | Potential bugs | X | Fix ASAP |
            | Best practice violations | X | Improve |

            ---

            ## 📝 TODO/FIXME/HACK Comments

            ### [FILE-001] `path/to/file.js:42`
            - **Type**: TODO / FIXME / HACK
            - **Comment**: "The actual comment text"
            - **Context**: Brief description of what this relates to
            - **Suggested action**: What should be done

            ---

            ## 🐛 Potential Bugs

            ### [BUG-001] Short description
            - **File**: `path/to/file.js:42`
            - **Type**: Race condition / Null access / etc.
            - **Description**: What could go wrong
            - **Impact**: What happens when it fails
            - **Fix**: Specific code change recommendation

            ---

            ## 🧹 Code Quality Issues

            ### [QUAL-001] Short description
            - **File**: `path/to/file.js:42`
            - **Issue**: Long function / Duplication / Magic number
            - **Recommendation**: How to improve

            ---

            ## ✅ Best Practice Violations

            ### [BP-001] Short description
            - **File**: `path/to/file.js:42`
            - **Violation**: What best practice is broken
            - **Recommendation**: How to fix

            ---

            ## 🎯 Top 3 Priority Actions

            1. **[file:line]** — Why this should be fixed first
            2. **[file:line]** — Why this matters
            3. **[file:line]** — Quick win improvement

            ---

            ## 📈 Trends

            - New TODOs since last audit: X
            - Resolved items: X
            - Total technical debt items: X

            ---

            ## Step 6: Create GitHub Issue

            Create a GitHub issue with:
              - Title: "🔍 Code Audit: X issues found (X bugs, X TODOs)"
              - Labels: code-quality, audit, tech-debt
              - Assignees: (leave empty)
              - Body: the full report from Step 5

            After creating the issue, provide:
              - Issue URL
              - Total count by category
              - The highest priority item requiring immediate attention
